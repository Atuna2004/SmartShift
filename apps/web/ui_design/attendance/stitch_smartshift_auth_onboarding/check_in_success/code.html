<html lang="en"><head>

                        "on-secondary-fixed": "#001a42",

                        "outline": "#747878",

                        "on-surface-variant": "#444748",
                        "on-tertiary": "#ffffff",

                        "error-container": "#ffdad6",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            background-color: #fdf8f8;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .success-bg-gradient {
            background: radial-gradient(circle at center, rgba(16, 185, 129, 0.08) 0%, transparent 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen text-on-surface">
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center p-lg relative overflow-hidden">
<!-- Subtle background atmospheric effect -->
<div class="absolute inset-0 success-bg-gradient pointer-events-none"></div>
<!-- Success Animation/Icon Container -->
<div class="relative z-10 flex flex-col items-center text-center max-w-sm w-full">
<div class="mb-xl animate-in fade-in zoom-in duration-700">
<div class="w-3xl h-3xl rounded-full bg-success/10 flex items-center justify-center mb-md mx-auto">
<span class="material-symbols-outlined text-success !text-[64px]" style="font-variation-settings: 'FILL' 1;">
                        check_circle
                    </span>
</div>
</div>
<!-- Identity & Content -->
<h1 class="font-display-md-mobile text-display-md-mobile md:font-display-md md:text-display-md text-primary mb-sm">
                Good morning, Alex!
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-3xl">
                You are clocked in.
            </p>
<!-- Card-based Details -->
<div class="w-full space-y-md mb-3xl">
<!-- Timestamp Card -->
<div class="bg-surface-card border border-hairline rounded-xl p-md flex items-center justify-between">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-on-surface-variant">schedule</span>
<span class="font-label-md text-label-md text-on-surface-variant">Clocked In At</span>
</div>
<span class="font-headline-sm-mobile text-headline-sm-mobile text-primary">08:56 AM</span>
</div>
<!-- Shift Details Card -->
<div class="bg-surface-card border border-hairline rounded-xl p-md text-left">
<div class="flex items-center gap-sm mb-xs">
<span class="material-symbols-outlined text-on-surface-variant">calendar_today</span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Current Shift</span>
</div>
<div class="mt-sm">
<p class="font-headline-sm-mobile text-headline-sm-mobile text-primary">Morning Shift</p>
<p class="font-body-md text-body-md text-on-surface-variant">09:00 - 17:00</p>
</div>
</div>
</div>
<!-- Actions -->
<div class="w-full space-y-sm">
<button class="w-full bg-primary text-on-primary font-button text-button py-md rounded-lg active:scale-95 transition-transform">
                    Go to Attendance History
                </button>
<button class="w-full bg-transparent border border-hairline text-primary font-button text-button py-md rounded-lg hover:bg-surface-container-low transition-colors active:scale-95 transition-transform">
                    Close
                </button>
</div>
</div>
</main>
<!-- Contextual Context Helper (Not Nav, but Feedback) -->
<div class="fixed bottom-lg left-1/2 -translate-x-1/2 w-[calc(100%-48px)] max-w-sm">
<div class="bg-primary text-on-primary px-md py-sm rounded-full flex items-center justify-between shadow-lg opacity-0 animate-in slide-in-from-bottom-4 fade-in duration-500 delay-1000 fill-mode-forwards">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">location_on</span>
<span class="text-caption font-caption">Location verified: HQ Office</span>
</div>
<span class="material-symbols-outlined text-[18px]">wifi</span>
</div>
</div>
<!-- Background Decorative Elements -->
<div class="fixed top-[-10%] right-[-10%] w-[40%] aspect-square rounded-full bg-surface-container-low opacity-40 blur-3xl pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[30%] aspect-square rounded-full bg-surface-container-high opacity-30 blur-3xl pointer-events-none"></div>
<script>
        // Simple animation trigger for the success toast
        window.addEventListener('load', () => {
            const toast = document.querySelector('.animate-in.delay-1000');
            if (toast) {
                setTimeout(() => {
                    toast.classList.remove('opacity-0');
                    toast.classList.add('opacity-100');
                }, 1000);
            }
        });
    </script>
</body></html>
