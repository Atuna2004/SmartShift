<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scan-overlay {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
            clip-path: polygon(
                0% 0%, 0% 100%, 
                calc(50% - 130px) 100%, 
                calc(50% - 130px) calc(50% - 130px), 
                calc(50% + 130px) calc(50% - 130px), 
                calc(50% + 130px) calc(50% + 130px), 
                calc(50% - 130px) calc(50% + 130px), 
                calc(50% - 130px) 100%, 
                100% 100%, 100% 0%
            );
        }
        .scan-line {
            height: 2px;
            background: #ffffff;
            box-shadow: 0 0 15px #ffffff;
            animation: scan 2.5s ease-in-out infinite;
        }
        @keyframes scan {
            0%, 100% { top: calc(50% - 130px); opacity: 0; }
            50% { top: calc(50% + 130px); opacity: 1; }
        }
        .corner-border {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 4px solid #ffffff;
        }
    </style>
<style>

<!-- Micro-interactions Script -->
<script>
        const flashBtn = document.getElementById('flash-toggle');
        const flashIcon = document.getElementById('flash-icon');
        let flashOn = false;

        flashBtn.addEventListener('click', () => {
            flashOn = !flashOn;
            flashIcon.textContent = flashOn ? 'flashlight_off' : 'flashlight_on';
            flashIcon.classList.toggle('text-secondary', flashOn);
            flashBtn.querySelector('div').classList.toggle('bg-secondary-fixed', flashOn);
            flashBtn.querySelector('div').classList.toggle('border-secondary', flashOn);
        });

        // Haptic-like feedback on scanner lock (visual only)
        document.querySelector('.scan-overlay').addEventListener('click', () => {
            const corners = document.querySelectorAll('.corner-border');
            corners.forEach(c => {
                c.style.borderColor = '#10b981';
                c.style.transform = 'scale(1.1)';
            });
            setTimeout(() => {
                corners.forEach(c => {
                    c.style.borderColor = '#ffffff';
                    c.style.transform = 'scale(1)';
                });
            }, 300);
        });
    </script>
