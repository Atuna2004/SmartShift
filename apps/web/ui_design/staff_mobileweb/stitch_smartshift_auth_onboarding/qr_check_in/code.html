<style>
    .scanner-overlay {
      background: rgba(0, 0, 0, 0.6);
      clip-path: polygon(
        0% 0%, 0% 100%, 
        15% 100%, 15% 25%, 85% 25%, 85% 65%, 15% 65%, 15% 100%,
        100% 100%, 100% 0%
      );
    }
    @keyframes scan-line {
      0% { top: 25%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 65%; opacity: 0; }
    }
    .scan-anim {
      animation: scan-line 3s linear infinite;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
      word-wrap: normal;
      white-space: nowrap;
      direction: ltr;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-canvas text-on-surface font-body-md overflow-hidden h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-surface">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-surface-container-high rounded-full transition-opacity duration-150 active:opacity-80">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-black text-primary">Workforce</h1>
</div>
<div class="flex items-center gap-2">
<button class="p-2 hover:bg-surface-container-high rounded-full transition-opacity duration-150 active:opacity-80">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</header>
<!-- Main Camera Canvas -->
<main class="flex-grow relative bg-black mt-16 mb-20 overflow-hidden">
<!-- Camera Viewport Simulation -->
<div class="absolute inset-0 w-full h-full">
<img alt="Camera Viewfinder" class="w-full h-full object-cover opacity-80" data-alt="A POV shot from a smartphone camera looking at a modern, minimalist office reception desk. The lighting is bright and natural, coming from large windows. The interior features clean lines, white walls, and a professional SaaS aesthetic. A small QR code stand is visible on a wooden counter, waiting to be scanned. The overall mood is efficient, high-tech, and professional." src="https://lh3.googleusercontent.com/aida-public/AB6AXuARDb21avW966sKf7Zsa6rXW_NQuopvWqYLqRbbrbAItgcqLlYia9dM8m-qgCxBFw7QqusLZUMV4YAdDRiRpdDMGUwvQynKVxWI4VjQF0MUT34qOBWL-2ZDz6w53eGbPVUUJ_rVeq0B_-QBNWCRQRAAJNMYLYdQzjJtXwSZvp1YbhisLWITHOAo2ffNMeeAZdYXh4u6ZXevmLK01odaWUjwZQ6OuGILpwV5lNN3_zsT2q3LLLLBH_gktXIdKT7Vpk90AaAfRLmQLyGX"/>
</div>
<!-- Scanner Overlay Mask -->
<div class="absolute inset-0 scanner-overlay z-10"></div>
<!-- Scanning Frame -->
<div class="absolute inset-0 flex flex-col items-center justify-center z-20 pointer-events-none">
<div class="w-[70%] aspect-square border-2 border-white/50 rounded-xl relative overflow-hidden" style="margin-top: -15vh;">
<!-- Corner Accents -->
<div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-white rounded-tl-lg"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-white rounded-tr-lg"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-white rounded-bl-lg"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-white rounded-br-lg"></div>
<!-- Animated Scan Line -->
<div class="absolute left-0 w-full h-1 bg-secondary shadow-[0_0_15px_rgba(0,88,190,0.8)] scan-anim"></div>
</div>
<!-- Instruction Text -->
<div class="mt-8 text-center px-6">
<p class="font-headline-sm text-headline-sm text-white font-bold drop-shadow-md">Align QR code to clock in</p>
<p class="font-body-md text-white/80 mt-2">Place the code within the frame to automatically scan</p>
</div>
</div>
<!-- Camera Controls -->
<div class="absolute bottom-10 left-0 w-full z-30 flex justify-center items-center gap-10 px-8">
<button class="flex flex-col items-center gap-2 group" id="torch-toggle">
<div class="w-14 h-14 rounded-full bg-white/10 backdrop-blur-md border border-white/20 flex items-center justify-center text-white group-active:scale-95 transition-transform">
<span class="material-symbols-outlined text-2xl" data-icon="flashlight_on">flashlight_on</span>
</div>
<span class="font-label-md text-label-md text-white">Flashlight</span>
</button>
<button class="flex flex-col items-center gap-2 group" id="manual-entry">
<div class="w-14 h-14 rounded-full bg-white/10 backdrop-blur-md border border-white/20 flex items-center justify-center text-white group-active:scale-95 transition-transform">
<span class="material-symbols-outlined text-2xl" data-icon="keyboard">keyboard</span>
</div>
<span class="font-label-md text-label-md text-white">Manual Entry</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-2 py-3 bg-surface border-t border-hairline">
<a class="flex flex-col items-center justify-center text-on-surface-variant px-3 py-1 hover:bg-surface-container-low transition-transform duration-150 active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label-md text-label-md">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-3 py-1 hover:bg-surface-container-low transition-transform duration-150 active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="calendar_today">calendar_today</span>
<span class="font-label-md text-label-md">Schedule</span>
</a>
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-xl px-3 py-1 transition-transform duration-150 active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="qr_code_scanner" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
<span class="font-label-md text-label-md">Check-in</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-3 py-1 hover:bg-surface-container-low transition-transform duration-150 active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="pending_actions">pending_actions</span>
<span class="font-label-md text-label-md">Requests</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant px-3 py-1 hover:bg-surface-container-low transition-transform duration-150 active:scale-95" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-md text-label-md">Profile</span>
</a>
</nav>
<script>
    // Micro-interactions for flashlight toggle
    const torchBtn = document.getElementById('torch-toggle');
    let isTorchOn = false;
    
    torchBtn.addEventListener('click', () => {
      isTorchOn = !isTorchOn;
      const icon = torchBtn.querySelector('.material-symbols-outlined');
      const bg = torchBtn.querySelector('div');
      
      if (isTorchOn) {
        icon.innerText = 'flashlight_off';
        icon.style.fontVariationSettings = "'FILL' 1";
        bg.classList.replace('bg-white/10', 'bg-white');
        bg.classList.replace('text-white', 'text-black');
      } else {
        icon.innerText = 'flashlight_on';
        icon.style.fontVariationSettings = "'FILL' 0";
        bg.classList.replace('bg-white', 'bg-white/10');
        bg.classList.replace('text-black', 'text-white');
      }
    });

    // Handle Manual Entry simple click effect
    document.getElementById('manual-entry').addEventListener('click', () => {
      alert('Switching to manual entry mode...');
    });
  </script>
</body></html>
